const PRELOADED_SYNOPSES = {"amking|witchhappenssummersisters1": "When a witch with rusty magic inherits her grandmother's cozy bookshop in a quirky small town, she stumbles into a murder mystery that only her awakening powers can solve. The first Summer Sisters book blends cozy mystery with paranormal charm and a dash of romance.", "akrose|mine": "In this dark reverse harem romance, a woman discovers she's been claimed by a group of powerful, dangerous men who will stop at nothing to keep her. Intense and possessive, Mine explores the push and pull between fear, desire, and belonging.", "aidenphoenix|hedgemage": "A hedge mage — a magic user without formal training — navigates a world where untrained power is both feared and coveted. This urban fantasy follows one outcast's journey to master abilities that defy the established magical order.", "aimeeeasterling|matebranded": "A wolf shifter woman is magically branded as the mate of a powerful alpha she's never met, setting off a clash of wills and an unexpected bond. The first Rune Wolf book is a fast-paced paranormal romance full of shifter politics and sizzling tension.", "aimeeeasterling|huntrornborn": "A young woman discovers she's heir to a wolf legacy she never knew existed, thrusting her into a dangerous world of pack rivalries and ancient magic. Huntress Born kicks off the Wolf Legacy series with action, romance, and shifting alliances.", "alexandriabellefleur|writteinthestars": "Two women who couldn't be more different are thrown together by a fake dating scheme that starts feeling very real. Written in the Stars is a warm, funny, and deeply romantic f/f love story about astrology, authenticity, and taking chances.", "aliciarades|fireinrostbook1": "Sixteen-year-old Crystal discovers she has psychic abilities just as a ghost starts haunting her with an urgent message. Fire in Frost is a YA paranormal mystery with a likable heroine, a cold case, and a touch of romance.", "ameliashaw|takenbythedragongking": "A woman is abducted and brought before a fearsome dragon king who claims she is his fated mate, sparking a clash between defiance and desire. This steamy paranormal romance delivers fantasy world-building alongside a slow-burn enemies-to-lovers dynamic.", "ameliashaw|thepacksmate": "A human woman finds herself at the center of a wolf pack's desperate search for their destined luna, wanted by an alpha who won't take no for an answer. This fast-paced shifter romance mixes danger, heat, and the push-pull of fated bonds.", "ameliashaw&tamsinbaker|prowlingtheirmate": "Two wolf shifter brothers discover the same woman is fated to be mate to them both, sending their pack into chaos and the woman into a whirlwind she never asked for. A steamy paranormal romance about sharing, loyalty, and unexpected love.", "andrewrowe|sufficientlyadvancedmagic": "Corin Cadence enters a dangerous tower full of magical traps in search of his missing brother, emerging with an attunement that makes him an outcast at the empire's elite academy. A richly detailed progression fantasy that blends dungeon-crawling, magic systems, and academy life.", "annasewell|blackbeauty": "Told from the perspective of a noble horse, this Victorian classic follows Black Beauty through the highs and lows of life with various owners, from loving caretakers to cruel masters. A timeless story of endurance, kindness, and the bond between humans and animals.", "annemccaffrey|nimishasship": "A brilliant female engineer inherits a unique sentient ship and sets out on a journey of discovery across the galaxy, building a crew and a legacy on her own terms. Nimisha's Ship is a standalone Pern-universe adjacent adventure full of McCaffrey's signature warmth and optimism.", "annemccaffrey|freedomslandingbook1": "Kris Bjornsen is among thousands of humans captured by the alien Catteni and dumped on an unknown planet to see if it's habitable. Forced to survive alongside her captors, she finds unexpected alliances and the first stirrings of resistance in this gripping sci-fi adventure.", "annemccaffrey|freedomsransombook4": "The concluding chapter of the Catteni series follows Kris and Zainal as they work to rebuild Earth's shattered economy by trading with alien civilizations. A satisfying conclusion to McCaffrey's underrated sci-fi series, balancing diplomacy, action, and heart.", "annemccaffrey|pegasusinspace": "A powerful telepath born in a future where psychic ability is humanity's most valuable resource trains at a space station while navigating the politics of his extraordinary gifts. Pegasus in Space bridges the Pegasus and Tower and Hive series with high-stakes adventure.", "annemccaffrey|alltheweyrsoofperndragonridersofpernbook11": "With Thread finally destroyed, Pern's dragonriders must find a new purpose — and discover the planet's mysterious AI, AIVAS, may hold the key to their future. A landmark entry in the Pern series that reshapes everything readers thought they knew about this beloved world.", "annemccaffrey|beyondbetween": "A short but poignant Pern story following a queen rider lost between time and space, exploring the mysterious fate that awaits dragons and riders who don't return. A haunting piece of Pern lore that expands the mythology with quiet emotional power.", "annemccaffrey|dragonharper": "Young Piemur navigates his changing voice and uncertain future at the Harper Hall, finding his place among Pern's most important institution. A coming-of-age Pern tale rich with music, friendship, and the courage to reinvent oneself.", "annemccaffrey|dragonsblood": "Two young candidates bond with fire lizards and discover a dark threat to Pern's dragon population that only they can stop. This entry deepens the Pern world with a mystery that spans generations and puts young heroes at the center of an ancient crisis.", "annemccaffrey|dragonfire": "A gripping Pern story following the dragonriders of a small Weyr as they struggle to protect their people against Thread while political tensions threaten to tear them apart. Full of the series' signature blend of adventure, loyalty, and dragonkind.", "annemccaffrey|dragonkin": "Two children — one a dragonrider's son, one a miner's daughter — form an unlikely friendship that leads them to discover a secret about Pern's dragons that could change everything. A charming, accessible entry point into the Pern universe.", "annemccaffrey|dragonstime": "When Thread returns earlier than expected and Pern's Weyrs are dangerously depleted, a small group of riders attempts time travel to fix the crisis — with unintended consequences. A tense and inventive Pern adventure that plays with the series' time-travel mythology.", "annemccaffrey|dragondrums": "Piemur, his voice changed and his future at Harper Hall uncertain, is sent on a secret mission that puts him in the middle of a political crisis threatening all of Pern. The third Harper Hall book is a thrilling coming-of-age adventure.", "annemccaffrey|dragonflightdragonridersofpernbook1": "Lessa, the last survivor of a noble hold, impresses the great queen dragon Ramoth and discovers that the ancient threat of Thread is returning to destroy Pern. The book that started it all — a sweeping sci-fi fantasy that launched one of fiction's most beloved worlds.", "annemccaffrey|dragongirl": "In the aftermath of a tragic fall, a young female rider must prove herself worthy of her dragon and her Weyr in a world that still questions women in fighting roles. A story of resilience, identity, and the unbreakable bond between rider and dragon.", "annemccaffrey|dragonheart": "A young queen rider and her dragon face the challenge of leading a Weyr through Thread and internal politics while uncovering a mystery tied to Pern's past. Rich with the warmth and detail that defines the best of the Pern series.", "annemccaffrey|dragonquestdragonridersofpernbook2": "F'nor and Canth attempt a dangerous time jump to end Thread forever, while Pern's leaders struggle with the social upheaval of changing traditions. The second Pern book deepens the world and raises the stakes with bold storytelling.", "annemccaffrey|dragonseye": "Set 250 years before Dragonflight, this novel follows the second Pass of Thread and the founding of many of Pern's most important traditions and Weyrs. Essential Pern lore delivered with McCaffrey's trademark clarity and heart.", "annemccaffrey|dragonsinger": "Menolly settles into life at Harper Hall, navigating friendships, rivalries, and her extraordinary musical gift while her nine fire lizards cause delightful chaos. The second Harper Hall book is a joyful, music-filled story of belonging and talent.", "annemccaffrey|dragonsong": "Menolly, a musically gifted girl forbidden to compose by her family, runs away and stumbles into an incredible discovery that will change her life forever. The first Harper Hall novel is a beautiful story of courage, creativity, and finding where you belong.", "annemccaffrey|everthetwain": "A short Pern story exploring the relationship between identical twin riders and their dragons, and what happens when one bond is threatened. A quiet, emotional gem from the Pern universe.", "annemccaffrey|moretadragonladyofpern": "The story of Moreta, a legendary queen rider who sacrificed everything to save Pern from a devastating plague centuries before Dragonflight. One of the most emotionally powerful entries in the entire Pern series.", "annemccaffrey|nerikasstory": "A short Pern story following a young woman's unexpected path to becoming a rider and finding her place in a Weyr. A quiet, character-driven tale that expands the world of Pern with warmth and detail.", "annemccaffrey|runnerofpern": "A young runner — one of Pern's message carriers who travel on foot — discovers a talent that may change his life and the future of his craft. A grounded, human-scale Pern story that explores a corner of the world rarely seen in the main series.", "annemccaffrey|skydragons": "The final Pern novel follows a new generation of riders as they travel back in time to establish the Eastern Weyr and safeguard Pern's future. A bittersweet and hopeful conclusion to the main Pern storyline.", "annemccaffrey|thechroniclesofpern": "A collection of short stories set across the history of Pern, filling in gaps and expanding on characters and events from the main series. Essential reading for dedicated Pern fans who want to explore every corner of this richly imagined world.", "annemccaffrey|thedolphinsofpern": "Pern's dolphins — ancient partners to humans who have been largely forgotten — reconnect with a young pair of humans who rediscover their language and their history. A charming, optimistic Pern novel about restoring a lost relationship.", "annemccaffrey|themasterharperofpern": "The life story of Robinton, the beloved Master Harper of Pern, from his childhood as a musical prodigy to his central role in the political upheavals of the Ninth Pass. A rich, deeply satisfying novel for anyone who fell in love with Robinton in the main series.", "annemccaffrey|therenegadesofpern": "Following characters on the margins of Pern society — holdless folk and renegades — as Thread returns and forces everyone to choose sides. A compelling look at Pern from the outside in, running parallel to the events of the main trilogy.", "annemccaffrey|theskiesofpern": "F'lessan and Tai face a new catastrophe threatening Pern — rogue meteorites — while the relationship between dragonriders and dolphins deepens. A late-series Pern novel that opens up new threats and new possibilities for the world.", "annemccaffrey|thesmallestdragonboy": "A young boy desperate to impress a dragon at a Hatching is passed over, only to find an extraordinary bond waiting for him in an unexpected place. One of the most beloved Pern short stories, perfect for new readers and longtime fans alike.", "annemccaffrey|thewhitedragondragonridersofpernbook3": "Young Lord Jaxom and his unusual white dragon Ruth forge an unlikely partnership and embark on a series of discoveries that will reshape Pern's understanding of its own history. The third main Pern novel is an adventure-filled coming-of-age story.", "annemccaffrey|catalystataleoofthebarquecats": "Aboard a spaceship crewed partly by intelligent cats, a young boy and his feline companion face a crisis that could endanger everyone on board. A charming sci-fi story that blends adventure with McCaffrey's love of the human-animal bond.", "annemccaffrey|damiabook2": "Damia, daughter of the powerful telepath The Rowan, must master her extraordinary gifts and find the mate who can match her volatile power. The second Tower and Hive book is a sweeping story of psychic gifts, family legacy, and dangerous love.", "annemccaffrey|therowanbook1": "The Rowan, an incredibly powerful but lonely telepath, runs a critical FTL relay station and finds unexpected connection when she senses a kindred mind light-years away. The first Tower and Hive book is a classic McCaffrey blend of sci-fi, romance, and found family.", "annemccaffrey&elizabethannscarbrough|changelings": "In the Petaybee series, two children with extraordinary connections to their living planet navigate a world where corporate interests threaten their way of life. A thoughtful sci-fi story about belonging, environment, and the bonds between children and their world.", "annemccaffrey&elizabethannscarbrough|delugebook3": "The twins of Petaybee face a climactic threat to their living planet as outside forces attempt to exploit its unique properties. The final book in The Twins of Petaybee trilogy brings the story to an emotional and satisfying conclusion.", "annemccaffrey&elizabethannscarbrough|maelstrombook2": "The Petaybee twins discover new powers and new dangers as they navigate the politics between their living world and the interstellar corporation that wants to control it. The middle book of the trilogy raises the stakes for both the characters and the planet they love.", "anyajcosgrove|adealwiththeshadowking": "A young woman strikes a dangerous bargain with a mysterious fae king to save her sister, only to find herself entangled in a world of magic, politics, and unexpected desire. The first Curse of the Fae book is a lush, enemies-to-lovers romantasy.", "aprillmoon|fatedtothewolfprince": "An omega wolf who has spent years suppressing her true nature is captured by a powerful wolf prince who claims she is his fated mate. A steamy omegaverse paranormal romance about identity, power, and the pull of destiny.", "ashleymcleo|alegacywitch": "Odette Dane arrives at Spellcasters Spy Academy carrying her family's legendary reputation — and none of their magical skill. When students start dying during the dreaded Culling year, she must untangle a conspiracy before she becomes the next target.", "avastrong|withoutmercy": "FBI special agent Dakota Steele pursues a relentless serial killer across multiple states, using her sharp instincts and forensic expertise to stay one step ahead. A taut, fast-paced thriller that launches a compelling new investigative series.", "blakepierce|allmine": "FBI agent Nicky Lyons is called in to investigate a series of disturbing disappearances that all point to a single obsessive predator. A gripping thriller that tests both Nicky's skills and her resolve as the case hits dangerously close to home.", "blakepierce|faceofdeath": "FBI agent Zoe Prime has an extraordinary ability to perceive mathematical patterns that others miss, making her invaluable — and isolated. When a serial killer's crimes form an impossible pattern, Zoe must confront both the killer and the secrets behind her own gift.", "blakerwolfe|undertow": "A gay merman shifter navigates life between the human world and the sea while caught in a paranormal romance that defies both worlds' expectations. A fresh, playful take on shifter romance with an LGBTQ+ lead and a richly imagined aquatic mythology.", "bamstoker|dracula": "The definitive vampire novel, told through journals, letters, and newspaper clippings, follows Professor Van Helsing and his companions as they race to stop Count Dracula from spreading his curse to England. Bram Stoker's gothic masterpiece remains one of the most influential horror novels ever written.", "brunomiller|thedarkkroadseriescollection": "A former special forces soldier and a resourceful teenager team up to survive a post-apocalyptic America after an EMP attack destroys modern civilization. The Dark Road series is a gritty, fast-paced survival thriller with heart at its center.", "carolbethanderson|strawintogold": "A young woman with the magical ability to spin straw into gold must navigate a kingdom of dangerous secrets and impossible demands. A fairy tale retelling rich with magic, courage, and a romance that grows in the most unlikely circumstances.", "carrievaughn|kittandthedeadmanshandbook5": "Kitty Norville heads to Las Vegas for a werewolf poker tournament and finds herself in the middle of supernatural turf wars and a conspiracy that could get her killed. The fifth Kitty book is a fast-paced, witty urban fantasy that perfectly captures the series' charm.", "carrievaughn|kittyandthemidnighthourbook1": "Kitty Norville is a late-night radio DJ and a werewolf who starts an advice show for the supernatural community, accidentally outing the existence of monsters to the world. The first book in a beloved urban fantasy series, sharp, funny, and impossible to put down.", "carrievaughn|kittyandthesilverbulletbook4": "Kitty returns to Denver to confront the pack that once abused her, armed with new confidence and new allies — but old enemies still want her dead. A turning point in the series, intense and emotionally satisfying.", "carrievaughn|kittyghoestowashingtonbook2": "Newly famous and navigating the political minefield of Washington D.C.'s supernatural community, Kitty must testify before Congress about the existence of werewolves and vampires. A clever and entertaining second installment that broadens the world considerably.", "carrievaughn|kittytakesaholidaybook3": "Kitty retreats to a remote cabin to write her memoir and escape the spotlight, only to find herself drawn into a sinister magical mystery threatening the local community. A quieter but deeply atmospheric entry in the series.", "cassandraclare|clockkangel": "Sixteen-year-old Tessa Gray arrives in Victorian London searching for her missing brother and is captured by a pair of mysterious women who reveal she has dangerous paranormal abilities. The first Infernal Devices book is a lush, romantic gothic adventure.", "cassiealexander|thetigerandtheswan": "A shifter romance that subverts expectations, pairing a fierce tiger shifter with a woman who refuses to be anyone's prize. Intense, sensual, and emotionally layered, it's a standalone that delivers on both the romance and the world-building.", "cassiealexander&kara lockharte|dragonsdontdate": "A dragon shifter who swore off human entanglements finds himself completely undone by the one woman who treats him like an ordinary man. A fun, steamy paranormal romance with sharp banter and genuine heart.", "cdgorri|hiswildobsession": "A powerful alpha wolf becomes obsessed with a woman he can't have, and when fate throws them together, his control — and hers — begins to crumble. His Wild Obsession is a steamy paranormal romance with intense alpha energy and undeniable chemistry.", "charlaineharris|alongerallbook2": "Gunnie Rose Gunnie takes on a dangerous new job escorting a wizard through a treacherous alternate-history American Southwest, where magic and violence go hand in hand. The second Gunnie Rose book deepens the world and raises the stakes with sharp, atmospheric storytelling.", "charlaineharris|allthedeadshallweepbook5": "In the gripping series finale, Gunnie Rose faces her most dangerous mission yet as the fragile alliances holding her world together begin to collapse. A powerful conclusion to Harris's alternate-history western fantasy series.", "charlaineharris|aneasyydeathbook1": "In an alternate 1930s America where magic is real and Russia controls the West Coast, gun-for-hire Lizbeth Rose takes a job that puts her in the crosshairs of dark forces. The first Gunnie Rose book is a gritty, inventive genre mashup of western, fantasy, and thriller.", "charlaineharris|therussianagebook3": "Gunnie Rose travels into Russian-controlled territory on a mission that forces her to confront both powerful enemies and complicated feelings about the people closest to her. A tense and emotionally rich third installment in the series.", "charlaineharris|theserpentineheavenbook4": "Gunnie Rose takes on a mission in the Holy Land section of the Divided States, uncovering a conspiracy that threatens the fragile political balance of her entire world. The penultimate Gunnie Rose book delivers action, intrigue, and significant character development.", "dbwest&lanehart|roman": "Roman is a gruff, tattooed bodyguard hired to protect a woman he instantly clashes with, but the tension between them is anything but professional. A steamy contemporary romance with a brooding hero and enemies-to-lovers heat.", "danielleljensen|thebridgekingdom": "A princess sent to spy on the enemy kingdom and its fearsome king finds herself questioning everything she was told — and falling for the man she was supposed to betray. The first Bridge Kingdom book is an addictive, morally complex romantasy.", "danielleljensen|theendlesswar": "The fourth Bridge Kingdom book brings the long-simmering war to a head as alliances are tested, secrets are revealed, and the cost of victory becomes almost unbearable. A sweeping, emotionally intense conclusion to the main story arc.", "danielleljensen|theinadequateheir": "The third Bridge Kingdom book introduces a new generation of characters navigating the same dangerous political landscape, with stakes higher than ever. A fresh perspective on the series' world that deepens the mythology significantly.", "danielleljensen|thetempestblade": "A standalone novella set in the Bridge Kingdom world, following a deadly assassin and her unexpected entanglement with a man she was sent to kill. Taut, romantic, and packed with the sharp writing that defines Jensen's work.", "danielleljensen|thetraitorqueen": "The second Bridge Kingdom book flips the script as the story continues from the king's perspective, revealing the full picture of the choices made in the first book. Essential reading that recontextualizes everything and delivers devastating emotional payoff.", "danielleljensen|thetwistedthrone": "A Bridge Kingdom companion novel exploring the political machinations and personal sacrifices that shaped the world before the main series began. Rich with the lore and intrigue that fans of the series love.", "deannahase|thevampireslastdance": "A vampire's centuries-long existence is upended when he falls for a human woman who shouldn't be able to resist his kind — but does anyway. A lush paranormal romance with gothic atmosphere and a hero who is as compelling as he is dangerous.", "egfoley|thelosthreirgryphonchronicles1": "Twelve-year-old Jake discovers he's the heir to a magical legacy and enters a hidden world of magic, monsters, and adventure at Griffon Academy. The first Gryphon Chronicles book is a charming middle-grade fantasy full of wonder, friendship, and British wit.", "ellatucker|bearenmysfatedmate": "A fierce bear shifter and the woman fated to be his mate must work through their instant animosity before their enemies destroy them both. A steamy paranormal romance with a growly hero and a heroine who refuses to be intimidated.", "ellatucker|wildheartasmokymoountainsbearshifterromance": "Deep in the Smoky Mountains, a bear shifter protects a woman fleeing a dangerous past, discovering that the bond forming between them may be the one thing neither can outrun. A warm, atmospheric shifter romance with stunning mountain scenery as its backdrop.", "elvabirdzoechant|herhellhoundbodyguard": "A woman in supernatural witness protection is assigned the most infuriating — and irresistible — hellhound bodyguard in existence. A fun, fast paranormal romance with a unique mythology and undeniable chemistry between the leads.", "emmaglass|thewitchbetweenworlds10bookepicfantasyboxset": "A complete ten-book epic fantasy box set following a witch navigating a world between realms, where magic is both gift and curse. Sweeping in scope and rich in world-building, this collection delivers a complete fantasy journey in one package.", "estherperel|matingincaptivityepisodes": "Renowned therapist and relationship expert Esther Perel explores the paradox of desire and domesticity through intimate couple sessions and her provocative insights. Her podcast sessions challenge conventional ideas about love, intimacy, and what it truly means to stay connected.", "fionagrace|herbalhomicidepennyhawthornecozymystery": "Tea specialist Penny Hawthorne finds herself the prime suspect when a mountain guide dies after drinking one of her brews in the Swiss Alps. A witty, globe-trotting cozy mystery with a charming heroine and a dashing Interpol detective.", "georgeorwell|1984": "Winston Smith, a low-ranking member of the totalitarian Party, secretly rebels against Big Brother's all-seeing surveillance state in a dystopian future England. Orwell's chilling masterpiece remains the definitive warning about political oppression and the destruction of truth.", "hgwells|hgwellsthesciencefictioncollection": "A collection of H.G. Wells's groundbreaking science fiction works, including stories that invented or defined entire genres. Essential reading for anyone interested in the foundations of science fiction, from time travel to alien invasion.", "jrward|ablominwinterbook225": "A short but emotionally rich novella set in the Black Dagger Brotherhood world, following a warrior and the woman who brings unexpected warmth into his dark existence. A perfect gift for fans of the series, full of Ward's signature intensity and heart.", "jrward|darklovertheblackdaggerbrotherhoodbook1": "Wrath, the last purebred vampire on earth and reluctant king of the Black Dagger Brotherhood, is tasked with guiding a half-breed woman through her transformation — and falls hard. The first BDB book is an explosive paranormal romance that launched one of the genre's most beloved series.", "jrward|bloodkissbook1": "The next generation of Black Dagger warriors gets its own story as a young fighter and a female vampire navigate forbidden attraction amid the Brotherhood's strict codes. Blood Kiss launches the Black Dagger Legacy spin-off with all of Ward's signature heat and drama.", "jrward|thejackalbook1": "In the brutal Prison Camp of the Black Dagger Brotherhood world, the Jackal has survived decades of captivity through sheer will — until a female prisoner makes him feel something again. Dark, intense, and compulsively readable.", "jamesmallory&mercedeslackey|theoutstretcdedshadowbook1": "In a world where Light and Dark magic are in eternal conflict, young mage Kellen Tavadon discovers that everything he was taught about magic is wrong. The first Obsidian Mountain Trilogy book is a sweeping epic fantasy with richly drawn characters and world-building.", "jamesmallory&mercedeslackey|tolightacandlebook2": "Kellen and his companions venture into the lands of the elves to forge an alliance against the encroaching dark forces threatening both their peoples. The second Obsidian Mountain book deepens the conflict and the mythology in spectacular fashion.", "jamesmallory&mercedeslackey|whendarknessfallsbook3": "The final battle between Light and Dark comes to a head as Kellen must make impossible choices to save everyone he loves. A grand, emotionally satisfying conclusion to the Obsidian Mountain Trilogy.", "jasperfforde|theeyreaffairathursdaynextnovel": "Literary detective Thursday Next lives in an alternate 1985 England where fiction is taken deadly seriously — and someone is kidnapping characters from classic novels. Wildly inventive, laugh-out-loud funny, and deeply in love with literature.", "jayseallynn|forwhomthebelletolls": "A paranormal romance with a Southern gothic twist, following a woman who can hear the thoughts of the dead and the dangerous man who needs her gift. Atmospheric and emotionally charged, it's a standout in the paranormal romance subgenre.", "jenniferlhart|witchwaayafterforty": "A woman hitting forty discovers she's a witch just as her carefully ordered life begins to unravel — and finds that midlife magic may be the best kind. A fun, witty paranormal that celebrates reinvention, self-discovery, and the power of women over forty.", "julianahaygert|thedemlonkiss": "A young woman entangled with a demon who wants her power must choose between survival and a dangerous attraction she can't explain. The Demon Kiss is a fast-paced paranormal romance with dark mythology and a smoldering slow burn.", "julianahaygert|themidnighttest": "A magical academy student faces a life-or-death examination while navigating a forbidden attraction to the one instructor who sees through her carefully constructed walls. A compelling paranormal academy romance with real emotional stakes.", "julianahaygert|thenightcalling": "When a mysterious force begins calling to a young woman in her dreams, she must unravel its origins before it consumes her — all while falling for someone she shouldn't trust. A atmospheric, romantic paranormal story with a genuinely creepy edge.", "katebold|thekillinggame": "FBI profiler Alexa Chase is drawn into the hunt for a calculating killer who treats murder like a sport, matching wits in a game where losing means death. The first Alexa Chase thriller is a pulse-pounding procedural with a sharp, tenacious heroine.", "katemoseman|silverspells": "A witch who specializes in silver magic discovers that her carefully guarded abilities are attracting the wrong kind of attention from the supernatural world. Silver Spells is a fun, fast paranormal with a clever magic system and a romance that sneaks up on you.", "kestrapingree|nightshadeacademyepisode1": "A newly awakened vampire navigates her first days at Nightshade Academy, where supernatural students learn to control their powers — and survive the social hierarchy. The first episode of an addictive paranormal academy series with strong YA energy.", "kymgrosso|kadesdarkembrace": "Kade, a powerful vampire, is drawn to a woman who threatens both his self-control and his carefully constructed world. A dark, sexy paranormal romance from Kym Grosso's New Orleans-set supernatural world.", "larakthorne|theemberaoth": "A young woman bound by a magical oath she didn't choose finds herself entangled with a powerful fae lord in a world where oaths can kill. A lush, slow-burn romantasy with a fascinating magic system and undeniable chemistry.", "laramiebriscoe|renegade": "A motorcycle club romance following a renegade biker who falls hard for a woman trying to escape her own dangerous past. Gritty, emotional, and intensely romantic, it's a standout in the MC romance genre.", "larydixon&mercedeslackey|theblackgryphonbook1": "Set two thousand years before Valdemar's founding, the story follows Skandranon the Black Gryphon — the greatest of his kind — as he fights in a war that could destroy everything he loves. The first Mage Wars book is an epic fantasy with a truly unforgettable hero.", "larydixon&mercedeslackey|thesilvergryphonbook3": "Tadrith and Silverblade, children of Mage Wars heroes, must survive alone in the wild after their patrol craft crashes in unknown territory. A survival adventure that also serves as a love story, with the series' characteristic depth and warmth.", "larydixon&mercedeslackey|thewhitegryphonbook2": "The survivors of the Mage Wars must build a new civilization in an unknown land, but a threat from a decadent empire may destroy everything before it begins. The second Mage Wars book balances political intrigue with the personal stories of beloved characters.", "larydixon&mercedeslackey|owlsightowlmagetrilogybook2": "Darian continues his training with the Hawkbrothers while a mysterious threat gathers in the north, testing his growing skills and his bonds with those he loves. The second Owl Mage book deepens both the world and the character in satisfying ways.", "lisabecker|starfishbook1": "A music journalist falls hard for the lead singer of a rising rock band, but the realities of fame and her own insecurities keep getting in the way. Starfish is a warm, witty contemporary romance full of great music references and genuine emotional honesty.", "luciaashta|perfectpending": "A woman on the verge of her magical awakening finds herself tangled up with a powerful shifter who has been waiting for her longer than she knows. Perfect Pending is a light, romantic paranormal with a satisfying slow build.", "mlynn|dragonrising": "A young woman discovers her blood carries ancient dragon magic in a world where dragons have been extinct for centuries — and someone wants her dead for it. Dragon Rising is a fast-paced fantasy romance with vivid world-building and a fierce heroine.", "maddoxgrey|ashiftinshadows": "Feline shifter Nemain has been hunted by her warlock ex-lover for centuries, but when he resurfaces in her quiet coastal town, she must finally face him — and the dark magic she's been hiding. A gritty, emotionally layered paranormal romance that subverts genre expectations.", "mandymroth|actofmercy": "Paranormal security operative Duke Marlow is sent to investigate — and possibly eliminate — a target who turns out to be his fated mate, a biomedical engineer who is decidedly not the enemy. A shifter romance with military thriller energy and McCaffrey-esque world-building.", "maryshelley|frankenstein": "Victor Frankenstein, obsessed with conquering death, creates a living being from dead matter — and then abandons his creation to a world that rejects him. Shelley's gothic masterpiece is a profound meditation on creation, responsibility, and what it means to be human.", "meganlinski|hiddenlegendsstartercollection": "A starter collection introducing the Hidden Legends universe — a world of magical academies, shifters, and supernatural intrigue across multiple interconnected series. The perfect entry point for new readers wanting to explore Megan Linski's expansive paranormal world.", "meganlinski|thefireprophecy": "A young woman with an unusual magical affinity enrolls in an Academy of Magical Creatures and discovers she may be at the center of an ancient prophecy. The first book in the Academy series blends magical school adventure with paranormal romance.", "meganlinski|torrent": "A young woman with water-based powers navigates a dangerous supernatural world where angels and demons are locked in an eternal conflict — and she may be the key to ending it. The first Angels and Demons book is a fast-paced paranormal adventure.", "meganlinski|universityofsorcerybooks13": "Three books in the University of Sorcery series follow a young sorceress navigating her magical education, supernatural politics, and a romance that complicates everything. A binge-worthy paranormal academy collection.", "meganlinski|thewolvennark": "A young woman enrolls at the University of Sorcery only to discover her wolf heritage and a magical mark that makes her a target. The Wolven Mark is an action-packed paranormal academy romance with strong world-building.", "meganlinski&aliciarades|academyofmagicalcreaturesbooks13": "Three books following students at the Academy of Magical Creatures, where learning to bond with supernatural beings is as dangerous as it is exhilarating. A fun, fast-paced collection that showcases two authors' complementary styles in one magical world.", "melissawright|betweeninkadshadows": "Thief Nimona Weston is assigned to steal from the king's castle by the dark magical society that owns her debt — and runs into a seneschal with secrets of his own. Between Ink and Shadows is a beautifully crafted gaslamp fantasy with a slow-burn forbidden romance.", "mercedeslackey|fortunesfool": "The Fool of a Slavic-style kingdom embarks on a sea voyage and discovers that fairy tale logic is very much real — and very much in play. The third 500 Kingdoms book is a charming, witty fairy tale retelling with Lackey's signature warmth.", "mercedeslackey|onegoodknight": "Princess Andromeda is sacrificed to a dragon who, it turns out, is not what the legends say — and neither is the kingdom that sent her. The second 500 Kingdoms book subverts the classic dragon-princess story in the most delightful way.", "mercedeslackey|thefairygodmother": "Elena Klovis is supposed to be a Cinderella figure, but the prince isn't available — so she becomes a Fairy Godmother instead. The first 500 Kingdoms book is a smart, funny take on fairy tale tropes that rewards both new readers and genre veterans.", "mercedeslackey|thesnowqueen": "A retelling of Hans Christian Andersen's Snow Queen set in the 500 Kingdoms universe, where Lackey puts her own witty, subversive spin on the classic story. Warm, inventive, and full of the series' characteristic charm.", "mercedeslackey|arrowsfalbook3": "Talia, the Queen's Own Herald, faces her greatest crisis yet as a war looms and the enemy uses magic to attack Valdemar's defenders from within. The emotionally devastating conclusion to the original Heralds of Valdemar trilogy.", "mercedeslackey|arrowsflightbook2": "Talia's Herald training continues as she faces her first solo circuit and discovers that her empathic Gift is both more powerful and more dangerous than she realized. The second Arrows book deepens both the world and the character in profound ways.", "mercedeslackey|arrowsofthequeen": "Young Talia is Chosen by a Companion and begins training as a Herald of Valdemar, discovering a world of magic, duty, and found family she never knew existed. The book that introduced millions of readers to Valdemar — warm, compelling, and utterly absorbing.", "mercedeslackey|fourandtwentyblackbirdsbook4": "The fourth Bardic Voices book follows a new generation of bards navigating a world where music is magic and power, and the stakes are higher than ever. A rich, emotionally satisfying continuation of the series.", "mercedeslackey|theeaglenightingalesbook3": "Nightingale and Robin continue their travels in the third Bardic Voices book, encountering political intrigue and dark magic that tests everything they believe. A compelling middle-series entry with strong world-building.", "mercedeslackey|thelaarkandthewrenbook1": "Rune, a talented musician, discovers that her music carries real power and sets out to prove herself in a world that underestimates her at every turn. The first Bardic Voices book is a feminist fantasy classic — warm, witty, and deeply satisfying.", "mercedeslackey|therobbinandthekestrelbook2": "Robin and Kestrel travel through a world where the Church wages war on music and magic, using their gifts to fight for freedom and truth. The second Bardic Voices book is a rousing adventure with a strong found family at its heart.", "mercedeslackey|bedlamboyzbedlamsbardbook3": "Eric Banyon and his allies face a new supernatural threat in Los Angeles, where elven magic collides with urban decay in the third Bedlam's Bard book. Fast-paced urban fantasy with a rock-and-roll heartbeat.", "mercedeslackey|bedlamsbardknightsofghostsandshadows": "Bard Eric Banyon discovers that his music literally works magic, drawing the attention of elves living beneath a condemned building in San Francisco. The book that launched the Bedlam's Bard series — a clever urban fantasy that takes Celtic mythology into the modern city.", "mercedeslackey|beyondworldsendbedlamsbardbook4": "Eric and his companions face a threat that spans both the elven and human worlds in the fourth Bedlam's Bard book, a fast-paced urban fantasy with high emotional stakes. Fans of the series will find much to love in this continuation.", "mercedeslackey|madmaudlinbedlamsbardbook6": "The sixth Bedlam's Bard book follows Eric Banyon as he tries to help a deeply troubled young man while navigating the increasingly complicated politics of the elven Underhills. Dark, emotionally complex, and thoroughly engrossing.", "mercedeslackey|spiritswhiteaslightningbedlamsbardbook5": "Eric Banyon's peaceful life in New York is disrupted by a mysterious new threat involving children with psychic gifts who are disappearing. The fifth Bedlam's Bard book balances magical adventure with a genuinely chilling mystery.", "mercedeslackey|summonedtothetourneybedlamsbardbook2": "The second Bedlam's Bard book sends Eric and his elven allies into a tournament that masks a deadly supernatural conspiracy. A satisfying continuation of the series with excellent pacing and character development.", "mercedeslackey|bastionvaldemarcollgiumchroniclesbook5": "In the fifth Collegium Chronicles book, Mags faces his most dangerous mission yet as an assassin targets not just him but everyone he loves at Collegium. The final chapter of Mags's coming-of-age story delivers emotional payoff and action in equal measure.", "mercedeslackey|changes": "Mags, the scholarship student Herald-trainee, discovers more about his mysterious past while navigating the political intrigues of Haven in the fourth Collegium Chronicles book. A pivotal installment that reshapes the series heading into its conclusion.", "mercedeslackey|foundation": "Thirteen-year-old Mags is Chosen by a Companion and brought to Collegium, where he must learn not just Herald skills but how to trust — and be trusted. The first Collegium Chronicles book is a fresh, compelling return to Valdemar from a completely new perspective.", "mercedeslackey|intrqiguesbook2": "Mags continues his Herald training while uncovering dangerous secrets about his own origins and the mysterious forces that seem to want him dead. The second Collegium Chronicles book deepens the mystery and the world-building impressively.", "mercedeslackey|redoubtvaldemarcollgiumchroniclesbook4": "Mags is captured and taken far from Valdemar, forcing him to use all his wits and his unique Gifts to survive and find his way home. A tense, action-packed fourth installment that puts Mags through the wringer.", "mercedeslackey|aerie": "Kiron and his dragon Avatre face new challenges as the liberation of Tia nears its endgame, in the fourth and final Dragon Jousters book. A satisfying conclusion to a unique series that blends ancient Egypt with dragons and coming-of-age adventure.", "mercedeslackey|alta": "Kiron trains as a dragon jouster in secret while working to free the enslaved Jousters and liberate his homeland from the god-kings who have oppressed it. The second Dragon Jousters book is an exciting adventure with a strong theme of resistance and courage.", "mercedeslackey|crownofvengeancethedragonprophecybook1": "Two young students at a magical university discover they are at the center of a thousand-year-old prophecy, and the choices they make will determine whether the prophecy is fulfilled or broken. The first Dragon Prophecy book is a sweeping epic fantasy with Lackey's trademark depth.", "mercedeslackey|deliveranceofdragonsthedragonprophecytrilogybook3": "The Dragon Prophecy trilogy reaches its shattering conclusion as the chosen heroes must make impossible sacrifices to fulfill a destiny that will reshape their entire world. Epic in scope and emotionally devastating.", "mercedeslackey|ascandalbattersaeelementalmastersbook12": "Nan Killian and Sarah Lyon-White investigate a supernatural conspiracy in Edwardian London while their elemental magic keeps them one step ahead of their enemies. The twelfth Elemental Masters book is a fast-paced mystery with delightful characters.", "mercedeslackey|missamelaslistelementalmastersbook17": "A governess with elemental magic discovers a plot within a prestigious London household that threatens both her charges and herself. The seventeenth Elemental Masters book is a cozy mystery with genuine magical stakes.", "mercedeslackey|phoenixandashselementalmastersbook3": "A young woman who was meant to be a 'Cinderella' is instead ground down by her stepfamily into a near-extinction of spirit — until her elemental magic begins to fight back. One of the most emotionally resonant Elemental Masters books, based on the fairy tale Cinderella.", "mercedeslackey|reservedforthecatelementalmaster": "A music hall cat's mysterious past intersects with elemental magic in Edwardian England, where nothing is quite what it seems. A delightfully quirky Elemental Masters mystery with one of Lackey's most memorable supporting characters.", "mercedeslackey|steadfast": "A young woman trapped in an abusive marriage finds strength through her elemental Fire magic and the unlikely protection of a damaged warrior. One of the darker and more emotionally powerful Elemental Masters books.", "mercedeslackey|thebarteredbridseselementalmastersbook13": "Set in the gaslit streets of late Victorian London, a young elemental master investigates a series of murders that seem tied to the city's most dangerous occult society. The thirteenth Elemental Masters book is atmospheric, twisty, and thoroughly gripping.", "mercedeslackey|thecaseofthespellboundchiledelementalmastersbook14": "Nan and Sarah investigate the disappearances of working-class children in the Dartmoor countryside, uncovering a dark magic that preys on the innocent. The fourteenth Elemental Masters book is a compelling mystery with a deeply satisfying resolution.", "mercedeslackey|thecypranielementalmastersbook18": "A young woman navigates the dangerous world of Victorian London's demi-monde while her elemental magic makes her both a target and a weapon. The eighteenth Elemental Masters book is atmospheric, feminist, and full of Lackey's trademark wit.", "mercedeslackey|thefirose": "A young woman summoned to be a wealthy recluse's housekeeper discovers he is hiding a terrible secret — and she holds the key to his salvation. The book that launched the Elemental Masters series is a beauty-and-the-beast retelling with real magic and genuine emotional depth.", "mercedeslackey|thewizardoflondonelementalmastersbook4": "Two children with psychic gifts are enrolled in a special school in London, where they encounter both genuine mentors and deeply sinister forces. The fourth Elemental Masters book is a charming, menacing Victorian fantasy.", "mercedeslackey|unnaturalissueelemtnalmasters": "A young Earth Master discovers she is the target of a necromancer who believes she is his natural prey — and must fight back with the help of an unlikely group of allies. A gripping Elemental Masters thriller set against the backdrop of Edwardian England.", "mercedeslackey|beyond": "The final Founding of Valdemar book follows Vanyel's distant ancestor Kordas Valdemar as he leads his people beyond the Empire's reach toward a new home. A triumphant conclusion to the prequel trilogy.", "mercedeslackey|intothewestbook2": "Kordas Valdemar and his people continue their long journey west, facing dangers both mundane and magical as they seek a new homeland free from the Empire's shadow. The second Founding of Valdemar book is a road-trip epic full of heart.", "mercedeslackey|valdemar": "Kordas Valdemar, a minor noble with a major plan, begins the greatest escape in history — leading his entire people away from a corrupt and crumbling empire. The first Founding of Valdemar book is a fresh, exciting new chapter in the beloved world.", "mercedeslackey|elvennbloodbook2": "Half-human, half-elven Shana and her friends continue their fight against the elvenlords' brutal rule in the second Halfblood Chronicles book. A rich fantasy sequel that deepens the world and the characters while raising the stakes considerably.", "mercedeslackey|theelvenbaneebook1": "In a world ruled by arrogant elvenlords who keep humans as slaves, a half-human, half-elven girl is born with powers that could overturn everything. The first Halfblood Chronicles book is a bold, compelling fantasy epic.", "mercedeslackey|elite": "Hunter Joyeaux Charmand faces increasingly dangerous prey in the second Hunter book, as the monsters outside the city walls grow stranger and the politics inside grow deadlier. An action-packed YA dystopian fantasy with a strong heroine.", "mercedeslackey|hunter": "In a world where humanity hides behind magical barriers against monstrous Othersiders, Hunter Joyeaux Charmand is called to the great city to serve — and immediately becomes a pawn in dangerous political games. The first Hunter book is a gripping YA dystopian fantasy.", "mercedeslackey|owlflightowlmagetrilogybook1": "Darian, an orphaned apprentice, flees into the deep forest after his village is raided and finds refuge with the mysterious Hawkbrothers, beginning a magical education he never expected. The first Owl Mage book is a coming-of-age fantasy rich with Valdemar's world.", "mercedeslackey|owlknightowlmagetrilogybook3": "Darian's training is complete and his destiny is near as he leads a mission to find his long-lost parents in the north — and confronts the threat that has been building throughout the trilogy. A satisfying conclusion to the Owl Mage Trilogy.", "mercedeslackey|closertohometheheraldspybook1": "Herald Mags, now an experienced spy, trains his son in the arts of espionage while navigating a conspiracy that threatens Valdemar's peace. The first Herald Spy book opens a new chapter for a beloved character.", "mercedeslackey|closertothechesttheheraldspybook3": "Mags faces a shadowy enemy who is targeting the women of Valdemar's Collegia in a campaign of terror and intimidation. The third Herald Spy book delivers a timely, emotionally charged story.", "mercedeslackey|closertothehearttheheraldspybook2": "Mags and his partner Amily navigate a delicate diplomatic crisis while an unknown enemy works in the shadows. The second Herald Spy book deepens the espionage elements that make the series so distinctive.", "mercedeslackey|magicspawnvaldemar": "Vanyel Ashkevron has no interest in becoming a Herald-Mage — until a tragedy unlocks gifts he never wanted and sends him down a path he cannot escape. The first Last Herald Mage book is one of Lackey's most emotionally powerful novels, and a landmark of LGBTQ+ fantasy.", "mercedeslackey|magicspricevaldemar": "The heartbreaking conclusion to Vanyel's story, as Valdemar's greatest Herald-Mage faces a destiny he has spent his whole life trying to avoid. One of the most devastating finales in fantasy, delivered with grace and love.", "mercedeslackey|magicspromisevaldemar": "Vanyel, exhausted from years of service, returns home for a much-needed rest — and finds that rest is the last thing waiting for him. The second Last Herald Mage book deepens Vanyel's story with emotional complexity and powerful magic.", "mercedeslackey|stormbreakingvaldemar": "The third Mage Storms book brings the magical catastrophe threatening Valdemar and its allies to a climax that will reshape the world. A grand, emotionally satisfying conclusion to one of Lackey's best trilogies.", "mercedeslackey|stormrisingvaldemar": "The magical Mage Storms are growing more severe, and Valdemar's allied nations must work together to understand and survive a threat that could destroy civilization. The second Mage Storms book raises the stakes with each chapter.", "mercedeslackey|stormwarningvaldemar": "Strange magical storms are disrupting life across the continent, and a young Herald-Mage must help forge an unprecedented alliance between Valdemar and its oldest enemies. The first Mage Storms book opens a new chapter in Valdemar's history.", "mercedeslackey|windsofchangetheemagewindsbook2": "Elspeth continues her training with the Hawkbrothers while Ancar of Hardorn marshals his forces against Valdemar. The second Mage Winds book deepens the threat and the emotional stakes in compelling ways.", "mercedeslackey|windsoffatevaldemar": "Herald-trainee Elspeth ventures beyond Valdemar's borders to find magical teachers and discovers a world far more complex and dangerous than she imagined. The first Mage Winds book marks a turning point in Valdemar's history.", "mercedeslackey|windsoffurythemagwindsbook3": "The final Mage Winds book brings Elspeth and her allies back to Valdemar for a showdown with the forces that have threatened the kingdom throughout the trilogy. Emotionally powerful and action-packed.", "mercedeslackey|brightlyburning": "A standalone Valdemar novel following Lavan Firestorm, a young Herald with a catastrophically dangerous Gift who becomes a legend — and a tragedy. One of the most emotionally intense Valdemar novels, not to be read without tissues nearby.", "mercedeslackey|bythesword": "Kerowyn, granddaughter of a famous mercenary, discovers a magical sword and a destiny she never wanted in this standalone novel that bridges the Vows and Honor and Heralds of Valdemar series. A fantastic female-led adventure.", "mercedeslackey|oathbloodbook3": "The third Vows and Honor book collects stories of Tarma and Kethry — sword-sworn warrior and mage — and their adventures across the world of Velgarth. A satisfying collection for fans of one of Lackey's most beloved duos.", "mercedeslackey|oathboundbook1": "Tarma, a warrior sworn to celibacy and vengeance, and Kethry, a mage bound by a magical sword that compels her to help those in need, form an unlikely partnership. The first Vows and Honor book launched one of Lackey's most enduring friendships.", "mercedeslackey|oathbreakersbook2": "Tarma and Kethry are hired to help a deposed queen reclaim her throne in a mission that tests both their skills and their bond. The second Vows and Honor book is a gripping military fantasy with a strong feminist heart.", "michaelbronski|aqueerhistoryoftheunitedstates": "A landmark work of cultural history tracing LGBTQ+ lives and their impact on American society from pre-colonial times to the present. Bronski's accessible and deeply researched narrative reclaims a history that has long been overlooked.", "mollyblack|barelyseentessaflintfbithriller": "FBI agent Tessa Flint investigates a series of disappearances where victims seem to vanish into thin air, leaving almost no evidence behind. A taut procedural thriller with a sharp heroine and a mystery that keeps you guessing.", "morganrice|oathborneyearone": "In a new fantasy world, a young woman takes a life-binding oath and begins training as one of an elite order of warriors sworn to protect the realm. Oathborne: Year One launches a sweeping epic fantasy series with a compelling heroine and vivid world-building.", "morganrice|nauticabook1": "A young woman with elemental water magic enrolls at Elemental Hall, an academy for those with nature-based powers, and discovers both her potential and a conspiracy that threatens the school. The first Nautica book is a fun, fast magical academy adventure.", "nellyhsteele|shadowbeasts": "A woman with the ability to see supernatural creatures others can't begins to realize the shadow beasts haunting her have a message — and a dangerous connection to her past. A paranormal mystery with gothic atmosphere and a compelling heroine.", "nelliehsteele|shelvingmagickcompleteseriesnoxedset": "The complete Shelving Magic series follows a bookshop owner who discovers her shop is a nexus for magical artifacts and supernatural visitors. A warm, witty paranormal cozy series collected in one volume.", "oliviafox|captured": "A woman captured by a powerful supernatural being discovers that her captor's intentions are far more complicated than simple imprisonment — and so are her own feelings. A dark paranormal romance with intense chemistry and a hero who walks the line between villain and savior.", "oscarwilde|thepictureofdoriangray": "Dorian Gray, a beautiful young man in Victorian London, wishes that a portrait of himself would age in his place — and the wish is granted, with devastating consequences. Wilde's only novel is a gorgeous, witty, and deeply unsettling meditation on vanity and moral corruption.", "patriciadeddy|ashiftinthewater": "A wolf shifter who has been tortured and left for dead is found by a woman with her own terminal secret, and the bond that forms between them may be the only thing that saves them both. The first Elemental Shifter book is a beautifully emotional paranormal romance.", "patrickabboud&simoncunich|thegreatestmenace": "An investigative deep dive into a little-known government experiment that deliberately targeted gay men in mid-20th century Australia, revealing a story of cruelty, courage, and survival. Meticulously researched and profoundly moving.", "piperrayne|mytwistoffortune": "When a woman's carefully planned life takes an unexpected detour, she finds herself entangled with a man who is everything she swore she didn't want. My Twist of Fortune is a witty, warm contemporary romance about letting go of plans and opening up to possibility.", "rachelmorgan|thememorythief": "In the magical city of Creighton, a thief who steals memories for a living takes a job that could unravel the fabric of her carefully constructed life. The first City of Wishes book is an inventive urban fantasy with a morally complex heroine.", "rachelmorgan|elementalthief": "Ridley Kayne has a gift for stealing elemental magic — a skill that makes her both invaluable and incredibly dangerous to the wrong people. The first Ridley Kayne Chronicles book is a fast-paced heist fantasy with a sharp, witty heroine.", "rachelmorgan|thecompletridleykaynechronicles": "The complete Ridley Kayne Chronicles collects all of Ridley's adventures as the most talented elemental thief in the business, from her first job to her most dangerous. A complete fantasy heist series in one volume.", "radclyffehall|thewellofloneliness": "Published in 1928 and immediately banned, this groundbreaking novel follows Stephen Gordon, a woman who identifies as an 'invert,' as she navigates love, loss, and a society that rejects her. One of the most important LGBTQ+ novels ever written.", "rebeccahefner|thedarkneswithin": "A vampire with a darkness growing inside him finds unexpected salvation in a human woman who shouldn't be able to reach him. The Darkness Within is an emotionally layered paranormal romance that explores redemption and the courage it takes to be saved.", "rebeccahefner|thedawnofpeace": "After centuries of war between vampires and humans, two people on opposite sides of the conflict discover that peace — and love — may require the ultimate sacrifice. The Dawn of Peace is a sweeping paranormal romance about hope in the aftermath of war.", "rebeccahefner|thesoliataryprotector": "A vampire sworn to protect a human woman he was never meant to desire discovers that the lines between duty and love are impossibly blurred. The Solitary Protector is a brooding, romantic paranormal with real emotional depth.", "rebeccayarros|fourthwingempyreanbook1": "Violet Sorrengail, small and bookish, is forced into the brutal war college for dragon riders and must survive both the training and the dangerous attraction to the most powerful — and most ruthless — rider there. Fourth Wing is a blockbuster romantasy that took the world by storm.", "rebeccayarros|ironflameempyreanbook2": "The secrets Violet uncovered in Fourth Wing put everyone she loves in danger, and the war she thought she understood is far more complicated — and far more personal — than she realized. Iron Flame delivers on every promise of the first book with even higher stakes.", "rebeccayarros|onyxstormempyreanbook3": "Violet and Xaden face a threat that could end not just the war but the world, forcing them to journey beyond everything they know in search of a power that may not exist. Onyx Storm is the ambitious, emotionally devastating third chapter of the Empyrean series.", "remingtonkane|thetannerseriesbooks13": "The first three TANNER books follow the world's most dangerous independent contractor — a man with no loyalties except to the job — through three high-stakes missions. Gritty, fast-paced thriller fiction at its most propulsive.", "samfeuerbach|thethiefandthemercenary": "A nimble-fingered thief and a battle-hardened mercenary are forced into an unlikely partnership by a job that is far more dangerous than either expected. The first Jester-Chronicles book is a fun, fast-paced adventure fantasy with great banter.", "sarahklwilson|flywiththearrow": "A young woman discovers a power that makes her both a weapon and a target in a magical world on the brink of war. Fly with the Arrow is a YA fantasy adventure with a fierce heroine and a magic system built around flight and speed.", "sarahpiper|bloodandmidnight": "A vampire hunter and the immortal she was sent to kill discover their fates are entangled in ways that defy everything they were taught. Blood and Midnight is a dark, sexy paranormal romance with real emotional stakes and morally grey characters.", "sarahpiper|darkdeception": "A powerful vampire uses deception to get close to a woman who holds a secret he desperately needs — but the deception becomes something neither of them planned for. Dark Deception is a brooding, atmospheric paranormal romance.", "solsmith|theautisticsguidetoselfdiscovery": "A deeply personal and insightful guide to self-discovery written from an autistic perspective, exploring identity, self-understanding, and the unique ways autistic people navigate the world. Thoughtful, compassionate, and genuinely useful.", "sophiekeetch|lefay": "The second Morgan le Fay book follows Morgan into the heart of Arthurian legend as she fights to protect her people and her power against the court that fears her. A lush, feminist retelling that gives one of history's most misunderstood women her full story.", "sophiekeetch|morganismyname": "Young Morgan of Cornwall discovers her extraordinary magical gifts and enters the world of Arthurian Britain, where she must navigate power, betrayal, and the first stirrings of the legend that will define her. A stunning feminist retelling of the Morgan le Fay story.", "sophiekeetch|stormovercamelot": "The final Morgan le Fay book brings the Arthurian age to its tragic, inevitable end — but Morgan's story is one of survival, legacy, and the enduring power of truth. A magnificent conclusion to a remarkable trilogy.", "tcedge|thesongoofthefirstblade": "A young warrior discovers he carries a bloodline that makes him both the most powerful fighter alive and the most hunted man in the world. The first Bladeborn Saga book is a sweeping epic fantasy with kinetic action and high emotional stakes.", "theaudibleeditors|whywemarchcelebrating50yearsofpride": "A commemorative collection celebrating fifty years of Pride, featuring stories, essays, and reflections on the LGBTQ+ rights movement from the Stonewall Riots to the present. Moving, inspiring, and historically essential.", "tillywallace|openinggambit": "A woman with magical investigative abilities takes on a case in Regency-era London that puts her in the path of a dangerous conspiracy — and a very distracting duke. Opening Gambit is a witty paranormal historical romance with excellent world-building.", "tjnichols|thefiredancersfamiliar": "A fire dancer bonds with a magical familiar that changes everything about how his power works — and everything about his carefully controlled life. A beautifully written fantasy romance with a unique magic system and a deeply felt love story.", "travisbeacham|impactwinter": "After an asteroid impact plunges the world into volcanic winter, a grizzled soldier and a young woman with mysterious abilities must cross a frozen, monster-haunted landscape to reach the last safe refuge. A dark, gripping post-apocalyptic fantasy with stunning audio production.", "triciaomally|wildirishsheart": "An American woman inherits a cottage in Ireland and finds herself entangled with the landscape, the magic, and an infuriating local man who seems to know more about her inheritance than she does. The first Mystic Cove book is a warm, romantic Irish fantasy.", "unamccormack|theautobiographyofkathrynjaneway": "Captain Kathryn Janeway reflects on her extraordinary career from her early days at Starfleet Academy to her legendary journey home across the Delta Quadrant. A loving tribute to one of Star Trek's most iconic characters, written with deep knowledge of the source material.", "verarcye|acrownoftearsandtreason": "A young woman with silver secrets and a dangerous past is thrust into the politics of a cruel magical court where trust is a weapon and love is a liability. The first book in The Curse of Silver Secrets series is a dark, lush romantasy.", "veronicraroth|divergent": "In a future Chicago divided into factions based on virtues, sixteen-year-old Tris Prior discovers she doesn't fit neatly into any one group — and that her secret could get her killed. The first Divergent book is a propulsive YA dystopian that became a cultural phenomenon.", "wilkiecollins|themoonstone": "A priceless Indian diamond disappears from a wealthy English household, and the investigation that follows unravels secrets, obsessions, and hidden lives. Often called the first modern detective novel, The Moonstone remains one of the most gripping mysteries ever written."};
let synopses = Object.assign({}, PRELOADED_SYNOPSES, JSON.parse(localStorage.getItem(SYNOPSIS_KEY) || '{}'));

let currentView = 'grid';
let filteredBooks = [];
let fetchAllRunning = false;
let fetchAllStop = false;

function saveBooks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
}

function saveSynopses() {
  localStorage.setItem(SYNOPSIS_KEY, JSON.stringify(synopses));
}

function getStats() {
  const authors = new Set(books.map(b => b.author));
  const series = new Set(books.filter(b => b.series).map(b => b.series));
  return { books: books.length, authors: authors.size, series: series.size };
}

function updateStats() {
  const s = getStats();
  document.getElementById('stat-books').textContent = s.books;
  document.getElementById('stat-authors').textContent = s.authors;
  document.getElementById('stat-series').textContent = s.series;
}

function populateFilters() {
  const authorSel = document.getElementById('filter-author');
  const seriesSel = document.getElementById('filter-series');
  const authors = [...new Set(books.map(b => b.author))].sort();
  const series = [...new Set(books.filter(b => b.series).map(b => b.series))].sort();

  authorSel.innerHTML = '<option value="">All Authors</option>' +
    authors.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');
  seriesSel.innerHTML = '<option value="">All Series</option>' +
    series.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query) return esc(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<mark class="highlight">$1</mark>');
}

function render() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const authorFilter = document.getElementById('filter-author').value;
  const seriesFilter = document.getElementById('filter-series').value;
  const sortBy = document.getElementById('sort-by').value;

  filteredBooks = books.filter(b => {
    const matchQuery = !query ||
      b.title.toLowerCase().includes(query) ||
      b.author.toLowerCase().includes(query) ||
      b.series.toLowerCase().includes(query);
    const matchAuthor = !authorFilter || b.author === authorFilter;
    const matchSeries = !seriesFilter || b.series === seriesFilter;
    return matchQuery && matchAuthor && matchSeries;
  });

  // Sort
  filteredBooks.sort((a, b) => {
    if (sortBy === 'title') return a.title.localeCompare(b.title);
    if (sortBy === 'series') {
      const sc = (a.series || 'zzz').localeCompare(b.series || 'zzz');
      return sc !== 0 ? sc : a.title.localeCompare(b.title);
    }
    const ac = a.author.localeCompare(b.author);
    return ac !== 0 ? ac : a.title.localeCompare(b.title);
  });

  document.getElementById('result-count').textContent =
    filteredBooks.length === books.length
      ? `${books.length} books`
      : `${filteredBooks.length} of ${books.length}`;

  const main = document.getElementById('book-content');

  if (filteredBooks.length === 0) {
    main.innerHTML = `<div class="no-results"><p>Nothing found</p><p>Try a different search or filter</p></div>`;
    return;
  }

  if (sortBy === 'author') {
    // Group by author
    const groups = {};
    filteredBooks.forEach(b => {
      if (!groups[b.author]) groups[b.author] = [];
      groups[b.author].push(b);
    });

    main.innerHTML = Object.entries(groups).map(([author, bks]) => `
      <div class="author-group">
        <div class="author-header">
          <span class="author-name">${highlight(author, query)}</span>
          <span class="author-count">${bks.length} book${bks.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="${currentView === 'grid' ? 'books-grid' : 'books-list'}">
          ${bks.map(b => renderBook(b, query)).join('')}
        </div>
      </div>
    `).join('');
  } else {
    main.innerHTML = `<div class="${currentView === 'grid' ? 'books-grid' : 'books-list'}">
      ${filteredBooks.map(b => renderBook(b, query, true)).join('')}
    </div>`;
  }
}

function bookKey(b) {
  return (b.author + '|' + b.title).toLowerCase().replace(/[^a-z0-9|]/g, '');
}

function renderBook(b, query, showAuthor = false) {
  const key = bookKey(b);
  const synopsis = synopses[key];
  const synopsisHtml = synopsis
    ? `<div class="synopsis">${esc(synopsis)}</div>`
    : `<button class="synopsis-btn" onclick="fetchSynopsis(this, '${key.replace(/'/g,"\\'")}', '${esc(b.title).replace(/'/g,"\\'")}', '${esc(b.author).replace(/'/g,"\\'")}')">Get synopsis</button>`;

  if (currentView === 'grid') {
    return `<div class="book-card" id="card-${key}">
      <div class="book-title">${highlight(b.title, query)}</div>
      ${showAuthor ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:6px">${highlight(b.author, query)}</div>` : ''}
      ${b.series ? `<span class="book-series-tag">${highlight(b.series, query)}</span>` : ''}
      ${synopsisHtml}
    </div>`;
  } else {
    return `<div class="book-row" id="card-${key}">
      <div class="book-title">${highlight(b.title, query)}${showAuthor ? ` <span style="color:var(--text-muted);font-size:0.82em">— ${highlight(b.author, query)}</span>` : ''}</div>
      ${b.series ? `<span class="book-series-tag">${highlight(b.series, query)}</span>` : ''}
      ${synopsisHtml}
    </div>`;
  }
}

async function fetchSynopsis(btn, key, title, author) {
  if (btn) {
    btn.textContent = 'Fetching…';
    btn.classList.add('loading');
    btn.disabled = true;
  }
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        messages: [{
          role: 'user',
          content: `Write a single 2-sentence synopsis for the audiobook "${title}" by ${author}. Be specific to this book. Return only the synopsis, no preamble.`
        }]
      })
    });
    const data = await response.json();
    const text = data?.content?.[0]?.text?.trim();
    if (text) {
      synopses[key] = text;
      saveSynopses();
      updateBannerCount();
      // Update the card in place
      const card = document.getElementById('card-' + key);
      if (card) {
        const btnEl = card.querySelector('.synopsis-btn');
        if (btnEl) {
          const div = document.createElement('div');
          div.className = 'synopsis';
          div.textContent = text;
          btnEl.replaceWith(div);
        }
      }
    } else {
      if (btn) { btn.textContent = 'Retry'; btn.classList.remove('loading'); btn.disabled = false; }
    }
  } catch(e) {
    if (btn) { btn.textContent = 'Retry'; btn.classList.remove('loading'); btn.disabled = false; }
  }
}

async function fetchAllSynopses() {
  if (fetchAllRunning) return;
  fetchAllRunning = true;
  fetchAllStop = false;

  const missing = books.filter(b => !synopses[bookKey(b)]);
  let done = 0;

  document.getElementById('fetch-all-btn').disabled = true;
  document.getElementById('stop-btn').style.display = 'inline-block';

  for (const b of missing) {
    if (fetchAllStop) break;
    const key = bookKey(b);
    updateBannerStatus(`Fetching ${done + 1} of ${missing.length}: ${b.title}…`);
    // Find the button in DOM if visible
    const card = document.getElementById('card-' + key);
    const btn = card ? card.querySelector('.synopsis-btn') : null;
    await fetchSynopsis(btn, key, b.title, b.author);
    done++;
    // Small delay to be polite to the API
    await new Promise(r => setTimeout(r, 600));
  }

  fetchAllRunning = false;
  document.getElementById('fetch-all-btn').disabled = false;
  document.getElementById('stop-btn').style.display = 'none';
  updateBannerCount();
  if (!fetchAllStop) updateBannerStatus('All synopses fetched!');
}

function stopFetchAll() {
  fetchAllStop = true;
  fetchAllRunning = false;
  document.getElementById('fetch-all-btn').disabled = false;
  document.getElementById('stop-btn').style.display = 'none';
  updateBannerStatus('Stopped.');
}

function updateBannerCount() {
  const total = books.length;
  const have = books.filter(b => synopses[bookKey(b)]).length;
  const pct = Math.round((have / total) * 100);
  const el = document.getElementById('banner-count');
  if (el) el.innerHTML = `<span>${have} of ${total}</span> books have synopses (${pct}%)`;
}

function updateBannerStatus(msg) {
  const el = document.getElementById('banner-status');
  if (el) el.textContent = msg;
}

function renderBanner() {
  const wrap = document.getElementById('fetch-banner-wrap');
  if (!wrap) return;
  const total = books.length;
  const have = books.filter(b => synopses[bookKey(b)]).length;
  const pct = Math.round((have / total) * 100);
  if (have === total) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <div class="fetch-banner" style="margin-bottom: 28px; position:relative; z-index:1;">
      <div>
        <p id="banner-count"><span>${have} of ${total}</span> books have synopses (${pct}%)</p>
        <p id="banner-status" style="font-size:0.75rem;color:var(--text-dim);margin-top:2px;"></p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="stop-btn" class="stop-btn" onclick="stopFetchAll()" style="display:none;">Stop</button>
        <button id="fetch-all-btn" class="fetch-all-btn" onclick="fetchAllSynopses()">Fetch All Synopses</button>
      </div>
    </div>`;
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  render();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('new-title').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('new-title').value = '';
  document.getElementById('new-author').value = '';
  document.getElementById('new-series').value = '';
}

function addBook() {
  const title = document.getElementById('new-title').value.trim();
  const author = document.getElementById('new-author').value.trim();
  const series = document.getElementById('new-series').value.trim();
  if (!title || !author) return alert('Title and Author are required.');
  books.push({ title, author, series });
  saveBooks();
  updateStats();
  populateFilters();
  closeModal();
  render();
}
